name: Build Rust for Linux

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ] # 当推送 v1.0.0 这样的标签时触发发布
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: zeroclaw

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-action@stable
     

    - name: Cache Cargo Registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build Release
      run: cargo build --release --verbose

    - name: Run Tests (Optional)
      run: cargo test --release --verbose

    # --- 以下步骤仅在创建 Tag (如 v1.0.0) 时执行，用于发布二进制文件 ---
    - name: Create Release Archive
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        mkdir -p release-assets
        cp target/release/$BINARY_NAME release-assets/
        # 打包成 tar.gz (Linux 习惯)
        tar -czvf release-assets/${BINARY_NAME}-linux-x86_64.tar.gz -C release-assets $BINARY_NAME
        # 或者保留原始文件
        # mv target/release/$BINARY_NAME release-assets/${BINARY_NAME}-linux-x86_64

    - name: Upload to GitHub Releases
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: release-assets/*
        body: |
          Auto-generated binary for Linux x86_64.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
